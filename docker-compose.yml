name: firecastnl

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: firecast_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html:delegated
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - frontend
    networks:
      - firecast

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: firecast_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html:delegated
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      - ./docker/php/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - firecast

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: firecast_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --sleep=1
    volumes:
      - ./backend:/var/www/html:delegated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - firecast

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: firecast_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: >
      sh -c "while true; do
      php artisan schedule:run --verbose --no-interaction;
      sleep 60;
      done"
    volumes:
      - ./backend:/var/www/html:delegated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - firecast

  frontend:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: firecast_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    networks:
      - firecast

  postgres:
    image: postgres:17-alpine
    container_name: firecast_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: firecast
      POSTGRES_USER: firecast
      POSTGRES_PASSWORD: firecast
      TZ: Europe/Amsterdam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firecast -d firecast"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - firecast

  redis:
    image: redis:7-alpine
    container_name: firecast_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - firecast

volumes:
  postgres_data:
  redis_data:

networks:
  firecast:
    driver: bridge
